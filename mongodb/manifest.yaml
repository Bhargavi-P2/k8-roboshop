apiVersion: apps/v1
kind: Deployement
metadata:
  name: mongodb
# replica set labels
  labels:
    component: mongodb
    project: roboshop
    tier: database
spec:
  replicas: 1
# these are the labels replica set use to create pod replicas, this should match pod labels
  selector:
    matchLabels:
      purpose: mongodb
      project: roboshop
      tier: database
# This is pod definition
  template:
    metadata:
      labels:
        component: mongodb
        project: roboshop
        tier: database
    spec:
      containers:
      - name: mongodb
        image: bhargavi486/mongodb.v1